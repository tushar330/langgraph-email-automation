services:
  - type: web
    name: agentia-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python create_index.py && uvicorn deploy_api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: MY_EMAIL
        sync: false
      - key: FRONTEND_URL
        value: https://your-frontend-vercel-url.vercel.app
